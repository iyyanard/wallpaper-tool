<!DOCTYPE html>
<html>
<head>
  <title>Wallpaper Tool</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      padding: 20px;
    }

    img {
      width: 100%;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Wallpaper Gallery</h1>

<div class="gallery">
  <img src="https://picsum.photos/300/200?1">
  <img src="https://picsum.photos/300/200?2">
  <img src="https://picsum.photos/300/200?3">
</div>

<script>
document.querySelectorAll("img").forEach(img => {
  img.onclick = () => {
    window.open(img.src, "_blank");
  };
});
</script>

<!-- Firebase -->

</body>
</html>
