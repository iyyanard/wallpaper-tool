<!DOCTYPE html>
<html>
<head>
  <title>Wallpaper Gallery</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .gallery {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .gallery img {
      width: 300px;
      height: 200px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<h1>Wallpaper Gallery</h1>

<!-- ✅ EMPTY GALLERY (IMPORTANT) -->
<div class="gallery"></div>


<!-- 🔥 Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
  // 🔥 Your Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyBiYbf1Gs6wuGjyGoqRtY_i96fQPDk4eH",
    authDomain: "wallpaper-manager-c4f90.firebaseapp.com",
    projectId: "wallpaper-manager-c4f90",
    storageBucket: "wallpaper-manager-c4f90.appspot.com",
    messagingSenderId: "182025764530",
    appId: "1:182025764530:web:9e8703c992f9cdd13193ab"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);

  // Firestore
  const db = firebase.firestore();

  const gallery = document.querySelector(".gallery");

  // 🔥 Load images from Firestore
  db.collection("wallpapers")
    .orderBy("createdAt", "desc")
    .get()
    .then((snapshot) => {
      gallery.innerHTML = "";

      snapshot.forEach((doc) => {
        const data = doc.data();

        const img = document.createElement("img");
        img.src = data.url;

        img.onclick = () => {
          window.open(data.url, "_blank");
        };

        gallery.appendChild(img);
      });
    })
    .catch((error) => {
      console.error("Error:", error);
    });
</script>

</body>
</html>
